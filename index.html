<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Plan | Spin & Win</title>
    <style>
        :root { --gold: #f1c40f; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: white; text-align: center; overflow-x: hidden; }
        
        .page { display: none; padding: 20px; max-width: 450px; margin: auto; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Forms */
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2b2b2b; color: white; outline: none; }
        button { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }

        /* The Professional Wheel */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 30px auto; }
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #333;
            background: conic-gradient(
                #e74c3c 0deg 60deg, #f1c40f 60deg 120deg, #3498db 120deg 180deg, 
                #9b59b6 180deg 240deg, #2ecc71 240deg 300deg, #e67e22 300deg 360deg
            );
            position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        /* Text on Wheel */
        .label { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; right: 50%; bottom: 50%; padding-top: 20px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; }
        .l1 { transform: rotate(30deg); }  /* 10 */
        .l2 { transform: rotate(90deg); }  /* 50 */
        .l3 { transform: rotate(150deg); } /* 10 */
        .l4 { transform: rotate(210deg); } /* 100 */
        .l5 { transform: rotate(270deg); } /* 10 */
        .l6 { transform: rotate(330deg); } /* 1000 */

        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid white; z-index: 10; filter: drop-shadow(0 2px 5px black); }

        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .pending { background: #d35400; }
        .approved { background: #27ae60; }
    </style>
</head>
<body>

    <div id="signupPage" class="page active">
        <h1 style="color:var(--gold)">BACKUP PLAN</h1>
        <div class="card">
            <h3>Create Account</h3>
            <input type="text" id="regUser" placeholder="Choose Username">
            <input type="password" id="regPass" placeholder="Choose Password">
            <button onclick="register()">Sign Up</button>
            <p onclick="showPage('loginPage')">Already have an account? Login</p>
        </div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:var(--gold)">LOGIN</h1>
        <div class="card">
            <input type="text" id="logUser" placeholder="Username">
            <input type="password" id="logPass" placeholder="Password">
            <button onclick="login()">Login</button>
            <p onclick="showPage('signupPage')">New here? Sign Up</p>
            <p onclick="showPage('adminLogin')" style="font-size:11px; color:#555">Admin Panel</p>
        </div>
    </div>

    <div id="mainPage" class="page">
        <div class="card">
            <h3 style="margin:0">Account: <span id="userDisp" style="color:var(--gold)"></span></h3>
            <h1 style="font-size: 45px; margin: 10px 0;">PKR <span id="balance">0</span></h1>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div id="wheel">
                <div class="label l1">10</div>
                <div class="label l2">50</div>
                <div class="label l3">10</div>
                <div class="label l4">100</div>
                <div class="label l5">10</div>
                <div class="label l6">1000</div>
            </div>
        </div>
        
        <button id="spinBtn" onclick="spinWheel()" style="font-size: 20px; padding: 15px;">SPIN</button>

        <div class="card" style="margin-top:20px">
            <h3>Withdrawal</h3>
            <input type="text" id="accName" placeholder="Account Name">
            <input type="number" id="accNum" placeholder="Number (EasyPaisa/JazzCash)">
            <input type="number" id="wdAmount" placeholder="Amount">
            <button onclick="requestWithdraw()" style="background:#27ae60; color:white">Request Withdrawal</button>
        </div>

        <div class="card">
            <h3>History</h3>
            <div id="userHistory">No requests yet</div>
        </div>
        <button onclick="location.reload()" style="background:#444; color:white">Logout</button>
    </div>

    <div id="adminLogin" class="page">
        <h3>Admin Key</h3>
        <input type="password" id="adminKey">
        <button onclick="checkAdmin()">Unlock Panel</button>
    </div>

    <div id="adminPanel" class="page">
        <h2>Withdrawal Requests</h2>
        <div id="adminList"></div>
        <button onclick="showPage('mainPage')">Back</button>
    </div>

    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/prize-wheel-01.mp3"></audio>
    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script>
        let users = JSON.parse(localStorage.getItem('backupUsers')) || {};
        let currentUser = "";
        let requests = JSON.parse(localStorage.getItem('backupRequests')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function register() {
            const u = document.getElementById('regUser').value;
            const p = document.getElementById('regPass').value;
            if(u && p) {
                users[u] = { password: p, balance: 0 };
                localStorage.setItem('backupUsers', JSON.stringify(users));
                alert("Signup Successful! Please Login.");
                showPage('loginPage');
            }
        }

        function login() {
            const u = document.getElementById('logUser').value;
            const p = document.getElementById('logPass').value;
            if(users[u] && users[u].password === p) {
                currentUser = u;
                document.getElementById('userDisp').innerText = u;
                document.getElementById('balance').innerText = users[u].balance;
                updateUI();
                showPage('mainPage');
            } else { alert("Wrong credentials!"); }
        }

        function spinWheel() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('spinSound').play();

            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 3600) + 720; 
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                let win = 0;
                let chance = Math.random() * 100;
                // 70% chance for 10, others rare
                if(chance > 98) win = 1000;
                else if(chance > 90) win = 100;
                else if(chance > 75) win = 50;
                else win = 10;

                users[currentUser].balance += win;
                localStorage.setItem('backupUsers', JSON.stringify(users));
                document.getElementById('balance').innerText = users[currentUser].balance;
                document.getElementById('winSound').play();
                alert("JACKPOT: PKR " + win);
                btn.disabled = false;
            }, 4000);
        }

        function requestWithdraw() {
            const name = document.getElementById('accName').value;
            const num = document.getElementById('accNum').value;
            const amt = parseInt(document.getElementById('wdAmount').value);
            let bal = users[currentUser].balance;

            if(amt > 0 && amt <= bal && name && num) {
                requests.push({user: currentUser, name, num, amt, status: 'Pending', id: Date.now()});
                users[currentUser].balance -= amt;
                localStorage.setItem('backupUsers', JSON.stringify(users));
                localStorage.setItem('backupRequests', JSON.stringify(requests));
                document.getElementById('balance').innerText = users[currentUser].balance;
                updateUI();
                alert("Request Submitted!");
            } else { alert("Invalid amount or details!"); }
        }

        function updateUI() {
            const history = document.getElementById('userHistory');
            history.innerHTML = requests.filter(r => r.user === currentUser).map(r => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333">
                    <span>PKR ${r.amt}</span>
                    <span class="status ${r.status.toLowerCase()}">${r.status}</span>
                </div>
            `).join('') || "No requests";

            const adminList = document.getElementById('adminList');
            adminList.innerHTML = requests.map((r, i) => `
                <div class="card" style="text-align:left; font-size:14px">
                    <b>User: ${r.user} | PKR ${r.amt}</b><br>
                    ${r.name} (${r.num})<br>
                    <button onclick="approve(${i})" style="width:45%; background:green; color:white">Approve</button>
                    <button onclick="reject(${i})" style="width:45%; background:red; color:white">Reject</button>
                </div>
            `).join('');
        }

        function approve(i) { requests[i].status = "Approved"; localStorage.setItem('backupRequests', JSON.stringify(requests)); updateUI(); }
        function reject(i) { requests[i].status = "Rejected"; localStorage.setItem('backupRequests', JSON.stringify(requests)); updateUI(); }

        function checkAdmin() {
            if(document.getElementById('adminKey').value === "545") showPage('adminPanel');
            else alert("Wrong Key");
        }
    </script>
</body>
</html>
